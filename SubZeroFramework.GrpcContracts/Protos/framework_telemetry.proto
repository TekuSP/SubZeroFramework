}

message FanCurvePointReply {
  int32 temperature_celsius = 1;
  double fan_duty_percent = 2;
}

message FanControlStateChangeReply {
  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  FanControlModeValue control_mode = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool is_available = 6;
  reserved 7, 8;
  TemperatureAggregationModeValue driving_temperature_aggregation = 9;
  repeated int32 driving_sensor_indices = 10;
  repeated FanCurvePointReply custom_curve_points = 11;
  bool has_active_override = 12;
  bool last_auto_restore_attempt_failed = 13;
  bool has_last_auto_restore_attempt = 14;
  int64 last_auto_restore_attempt_at_unix_time_milliseconds = 15;
  string last_auto_restore_error = 16;
  optional double last_duty_percent = 17;
  // Per-fan curve profile slots and which one is active (fields 4/10/11 reflect the active slot's curve).
  int32 active_curve_slot = 18;
  repeated FanCurveProfileReply curve_profiles = 19;
  // The fan this one is grouped under ("Applies to" link). Persisted by the service so the grouping survives
  // restarts and is authoritative across clients. Unset means the fan is independent (or a leader itself).
  optional int32 linked_leader_index = 20;
}

message FanControlStateChangeBatchReply {
  repeated FanControlStateChangeReply changes = 1;
}

message FanStateChangeReply {
  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  FanStateValue fan_state = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool is_available = 6;
