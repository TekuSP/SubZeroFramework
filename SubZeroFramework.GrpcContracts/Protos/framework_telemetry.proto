message SetFanRpmRequest {
  int32 fan_index = 1;
  int32 target_speed_rpm = 2;
}

message SetFanRpmReply {
  int32 fan_index = 1;
  int32 applied_speed_rpm = 2;
}

message SetFanDutyRequest {
  int32 fan_index = 1;
  double duty_percent = 2;
  // When true, actuate the EC live but do not persist the override to the configuration store
  // (a volatile "preview"); a service restart restores the last applied state.
  bool preview = 3;
}

message SetFanDutyReply {
  int32 fan_index = 1;
  double applied_duty_percent = 2;
}

message SetFanMaxRequest {
  int32 fan_index = 1;
  // When true, actuate the EC live but do not persist (volatile preview). See SetFanDutyRequest.preview.
  bool preview = 2;
}

message SetFanMaxReply {
  int32 fan_index = 1;
  double applied_duty_percent = 2;
}

message SetFanCustomCurveRequest {
  int32 fan_index = 1;
  map<int32, double> curve_points = 2;
  repeated int32 driving_sensor_indices = 3;
  TemperatureAggregationModeValue driving_temperature_aggregation = 4;
  // When true, actuate the EC live but do not persist (volatile preview). See SetFanDutyRequest.preview.
  bool preview = 5;
}

message SetFanCustomCurveReply {
  int32 fan_index = 1;
  bool succeeded = 2;
  string message = 3;
}

message RestoreAutoFanControlRequest {
  int32 fan_index = 1;
  // When true, actuate the EC live but do not persist (volatile preview). See SetFanDutyRequest.preview.
  bool preview = 2;
}

message RestoreAutoFanControlReply {
  int32 fan_index = 1;
}

message HoldFanPreviewRequest {
  int32 fan_index = 1;
}

message HoldFanPreviewReply {
  // The first reply signals the hold is established and the pre-preview state has been captured, so the
  // client may safely send its preview command. Further replies (if any) are keepalives.
  bool ready = 1;
}

// One per-fan curve profile slot. An unconfigured slot has is_configured = false.
message FanCurveProfileReply {
  int32 fan_index = 1;
  int32 slot = 2;
  string name = 3;
  bool is_configured = 4;
  repeated FanCurvePointReply points = 5;
  repeated int32 driving_sensor_indices = 6;
  TemperatureAggregationModeValue aggregation = 7;
  // When set, this slot mirrors the active curve of follow_fan_index instead of using its own points.
  bool has_follow_target = 8;
  int32 follow_fan_index = 9;
}

message SaveFanCurveProfileRequest {
  int32 fan_index = 1;
  int32 slot = 2;
  string name = 3;
  map<int32, double> curve_points = 4;
  repeated int32 driving_sensor_indices = 5;
  TemperatureAggregationModeValue driving_temperature_aggregation = 6;
  bool has_follow_target = 7;
  int32 follow_fan_index = 8;
  // When true, also make this the active slot and switch the fan into curve mode.
  bool activate = 9;
}

message SetActiveFanCurveProfileRequest {
  int32 fan_index = 1;
  int32 slot = 2;
}

message ClearFanCurveProfileRequest {
  int32 fan_index = 1;
  int32 slot = 2;
}

message SetFanLinkRequest {
  int32 fan_index = 1;
  // Unset clears the link (the fan becomes independent); set groups it under that leader.
  optional int32 linked_leader_index = 2;
}

message FanCurveProfileOperationReply {
  int32 fan_index = 1;
  int32 slot = 2;
  bool succeeded = 3;
  string message = 4;
}

message GetChargeLimitsRequest {
}

message SetChargeLimitsRequest {
  int32 minimum_percent = 1;
  int32 maximum_percent = 2;
}

message ChargeLimitsReply {
  bool succeeded = 1;
  string message = 2;
  bool is_available = 3;
  int32 minimum_percent = 4;
  int32 maximum_percent = 5;
}

