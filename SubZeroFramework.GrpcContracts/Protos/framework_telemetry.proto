  TEMPERATURE_SENSOR_NAME_VALUE_APU = 10;
  TEMPERATURE_SENSOR_NAME_VALUE_DGPU_VR = 11;
  TEMPERATURE_SENSOR_NAME_VALUE_DGPU_VRAM = 12;
  TEMPERATURE_SENSOR_NAME_VALUE_DGPU_AMB = 13;
  TEMPERATURE_SENSOR_NAME_VALUE_DGPU_TEMP = 14;
