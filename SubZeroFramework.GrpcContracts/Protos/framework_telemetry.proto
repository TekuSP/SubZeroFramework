  oneof details {
    FrameworkLaptop12CoolingDetailsReply framework_laptop_12 = 1;
    FrameworkLaptop13CoolingDetailsReply framework_laptop_13 = 2;
    FrameworkLaptop16CoolingDetailsReply framework_laptop_16 = 3;
    FrameworkDesktopCoolingDetailsReply framework_desktop = 4;
