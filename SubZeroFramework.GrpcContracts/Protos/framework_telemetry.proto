syntax = "proto3";

option csharp_namespace = "SubZeroFramework.GrpcContracts";

package subzeroframework.grpc;

service FrameworkStatusService {
  rpc GetStatus (GetStatusRequest) returns (FrameworkStatusReply);
  rpc WatchStatus (WatchStatusRequest) returns (stream FrameworkStatusReply);
}

service FrameworkServiceConfigurationService {
  rpc GetServiceConfiguration (GetServiceConfigurationRequest) returns (FrameworkServiceConfigurationReply);
  rpc WatchServiceConfiguration (WatchServiceConfigurationRequest) returns (stream FrameworkServiceConfigurationReply);
  rpc ApplyServiceConfiguration (ApplyServiceConfigurationRequest) returns (ServiceConfigurationOperationReply);
  rpc SaveServiceConfiguration (SaveServiceConfigurationRequest) returns (ServiceConfigurationOperationReply);
  rpc LoadServiceConfiguration (LoadServiceConfigurationRequest) returns (ServiceConfigurationOperationReply);
  rpc RelocateServiceConfiguration (RelocateServiceConfigurationRequest) returns (ServiceConfigurationOperationReply);
}

service FrameworkTelemetryService {
  rpc WatchFanCapabilities (WatchFanCapabilitiesRequest) returns (stream FanCapabilityChangeBatchReply);
  rpc WatchFanControlStates (WatchFanControlStatesRequest) returns (stream FanControlStateChangeBatchReply);
  rpc WatchFanStates (WatchFanStatesRequest) returns (stream FanStateChangeBatchReply);
  rpc WatchTelemetryChannels (WatchTelemetryChannelsRequest) returns (stream TelemetryChannelChangeBatchReply);
  rpc WatchCurrentTelemetryValues (WatchCurrentTelemetryValuesRequest) returns (stream CurrentTelemetryValueChangeBatchReply);
  rpc WatchTelemetrySeries (WatchTelemetrySeriesRequest) returns (stream TelemetrySeriesPointChangeBatchReply);
  rpc WatchPowerDelivery (WatchPowerDeliveryRequest) returns (stream PowerDeliveryReply);
  rpc WatchModuleInventory (WatchModuleInventoryRequest) returns (stream ModuleInventoryReply);
}

service HardwareInfoService {
  rpc GetHardwareInfo (GetHardwareInfoRequest) returns (HardwareInfoReply);
  rpc WatchHardwareInfo (WatchHardwareInfoRequest) returns (stream HardwareInfoReply);
  rpc WatchHardwareInfoHistory (WatchHardwareInfoHistoryRequest) returns (stream HardwareInfoHistoryChangeBatchReply);
}

service FrameworkFanControlService {
  rpc SetFanRpm (SetFanRpmRequest) returns (SetFanRpmReply);
  rpc SetFanDuty (SetFanDutyRequest) returns (SetFanDutyReply);
  rpc SetFanMax (SetFanMaxRequest) returns (SetFanMaxReply);
  rpc SetFanCustomCurve (SetFanCustomCurveRequest) returns (SetFanCustomCurveReply);
  rpc RestoreAutoFanControl (RestoreAutoFanControlRequest) returns (RestoreAutoFanControlReply);
  // Per-fan curve profile slots (up to 5 unique slots per fan, with an optional per-slot follow target).
  rpc SaveFanCurveProfile (SaveFanCurveProfileRequest) returns (FanCurveProfileOperationReply);
  rpc SetActiveFanCurveProfile (SetActiveFanCurveProfileRequest) returns (FanCurveProfileOperationReply);
  rpc ClearFanCurveProfile (ClearFanCurveProfileRequest) returns (FanCurveProfileOperationReply);
  // "Applies to" group membership: set (or clear, when linked_leader_index is unset) which fan this one is
  // grouped under. Persisted so the grouping survives restarts and streams back via linked_leader_index.
  rpc SetFanLink (SetFanLinkRequest) returns (FanCurveProfileOperationReply);
  // Preview safety lease: the client keeps this server stream open while a volatile preview is live. The
  // service captures the fan's pre-preview state when the stream opens, and if the stream breaks before the
  // preview is committed (Apply) or explicitly released, it reverts the fan to that captured state. This
  // covers an app crash or kill mid-preview so the EC is never left stuck on an unapplied preview.
  rpc HoldFanPreview (HoldFanPreviewRequest) returns (stream HoldFanPreviewReply);
  // Battery charge floor/ceiling. Get is a plain read; Set is an EC write gated by the same authorization.
  rpc GetChargeLimits (GetChargeLimitsRequest) returns (ChargeLimitsReply);
  rpc SetChargeLimits (SetChargeLimitsRequest) returns (ChargeLimitsReply);
}

