  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  uint32 features = 4;
  bool supports_fan_control = 5;
  bool supports_thermal_reporting = 6;
  int64 observed_at_unix_time_milliseconds = 7;
  bool is_available = 8;
  int32 maximum_speed_rpm = 9;
  FrameworkCoolingDetailsReply cooling_details = 10;
}

message FanCapabilityChangeBatchReply {
