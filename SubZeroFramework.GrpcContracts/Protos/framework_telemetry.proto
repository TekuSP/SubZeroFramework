  TelemetryChangeKind change_kind = 1;
  TelemetryChannelIdReply channel_id = 2;
  string display_name = 3;
  string unit_symbol = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool has_numeric_value = 6;
  double numeric_value = 7;
  bool is_available = 8;
  TemperatureStateValue temperature_state = 9;
  PowerSourceStateValue power_source_state = 10;
  BatteryStateValue battery_state = 11;
  string battery_manufacturer = 12;
  string battery_model_number = 13;
  string battery_serial_number = 14;
  string battery_type = 15;
  bool has_battery_remaining_capacity_ampere_hours = 16;
  double battery_remaining_capacity_ampere_hours = 17;
  bool has_battery_design_capacity_ampere_hours = 18;
  double battery_design_capacity_ampere_hours = 19;
  bool has_battery_last_full_charge_capacity_ampere_hours = 20;
  double battery_last_full_charge_capacity_ampere_hours = 21;
  bool has_battery_design_voltage_volts = 22;
  double battery_design_voltage_volts = 23;
  bool has_battery_cycle_count = 24;
  uint32 battery_cycle_count = 25;
  // Platform role of a temperature sensor (thermal channels only); UNSPECIFIED for non-thermal or unidentified.
  TemperatureSensorNameValue sensor_name = 26;
  // Platform role of a fan (fan channels only); UNSPECIFIED for non-fan or unidentified.
  FanNameValue fan_name = 27;
}

message CurrentTelemetryValueChangeBatchReply {
  repeated CurrentTelemetryValueChangeReply changes = 1;
}

message TelemetrySeriesPointChangeReply {
  TelemetryChangeKind change_kind = 1;
  int64 sample_id = 2;
  TelemetryChannelIdReply channel_id = 3;
  int64 observed_at_unix_time_milliseconds = 4;
  double numeric_value = 5;
}

message TelemetrySeriesPointChangeBatchReply {
  repeated TelemetrySeriesPointChangeReply changes = 1;
}

message FrameworkStatusReply {
  int64 observed_at_unix_time_milliseconds = 1;
  string connection_library_version = 2;
  string connection_library_informational_version = 3;
  bool is_library_available = 4;
  bool has_framework_device_value = 5;
  bool is_framework_device = 6;
  string device_model = 7;
  string platform = 8;
  string platform_family = 9;
  repeated string supported_drivers = 10;
  string active_driver = 11;
  string ec_build_info = 12;
  bool is_ec_polling_enabled = 13;
  bool is_connection_open = 14;
  bool is_grpc_active = 15;
  int64 last_telemetry_observed_at_unix_time_milliseconds = 16;
  bool requires_elevation = 17;
  string last_error = 18;
  bool is_fan_control_enabled = 19;
  bool has_caller_identity_validation = 20;
  string fan_control_authorization_message = 21;
}

message WatchPowerDeliveryRequest {
}

// USB-C Power Delivery state for one expansion-card slot (enums carried as their names).
message PowerDeliveryPortState {
  int32 slot_index = 1;
  bool is_present = 2;
  bool is_active_port = 3;
  bool has_power_delivery_contract = 4;
  string c_state = 5;
  string power_role = 6;
  string data_role = 7;
  string cc_polarity = 8;
  double voltage_volts = 9;
  double current_amperes = 10;
  bool is_vconn_active = 11;
  bool is_epr_active = 12;
  bool is_epr_supported = 13;
  uint32 alt_mode_flags = 14;
  // Expansion card detected in the slot (FrameworkExpansionCardType name; "Unknown" when none).
  string card_type = 15;
  // Static board capability of the slot (independent of the live PD state above).
  string data_lane = 16;                 // FrameworkUsbCDataLane name (e.g. "Usb4", "Thunderbolt4").
  string display_port_capability = 17;   // FrameworkDisplayPortCapability name (e.g. "Dp21Uhbr10", "None").
  bool capability_supports_charging = 18; // Whether the slot supports USB-PD charging.
  int32 max_charge_watts = 19;           // Max charge power in watts (0 = none/undocumented).
  bool usb_a_high_power = 20;            // Whether the "higher power consumption" USB-A note applies.
  bool capability_documented = 21;       // Whether a documented capability matrix covers this slot.
  // Where the port lives: "Mainboard" (numbered slots) or "GraphicsModule" (the expansion-bay GPU port).
  string port_source = 22;
  // Physical position label (upstream framework-system: "Right Back", "Left Middle", "Graphics module", …).
  string port_position = 23;
  // Whether the port is on the left side of the chassis (upstream: PD ports 2 & 3 are left).
  bool port_is_left = 24;
}

message PowerDeliveryReply {
  repeated PowerDeliveryPortState ports = 1;
}

message WatchModuleInventoryRequest {
}

// One detected or inferred module descriptor (enums carried as their FrameworkDotnet names, flags as raw bits).
message ModuleDescriptor {
  string identity = 1;          // FrameworkModuleIdentity name (e.g. "UsbCExpansionCard").
  string bus = 2;               // FrameworkModuleBus name (e.g. "Ec", "Usb").
  string slot_kind = 3;         // FrameworkModuleSlotKind name (e.g. "UsbCExpansionCardSlot").
  string confidence = 4;        // FrameworkModuleConfidence name (e.g. "Direct").
  bool is_present = 5;
  int32 slot_index = 6;
  uint32 flags = 7;             // FrameworkModuleFlags bits (BuiltIn/Active/Connected/HasPdContract/…).
  uint32 vendor_id = 8;
  uint32 product_id = 9;
  int32 board_id = 10;
  string position = 11;         // FrameworkInputModulePosition name ("TopRow0"…"Touchpad"; "Unknown" elsewhere).
  string card_type = 12;        // FrameworkExpansionCardType name (USB-C slots only; "Unknown" elsewhere).
  string card_confidence = 13;  // Card-type identification confidence (USB-C slots only).
}

// The full module inventory, grouped the way the Modules page renders it.
message ModuleInventoryReply {
  repeated ModuleDescriptor usb_c_slots = 1;      // Numbered expansion-card slots in index order.
  repeated ModuleDescriptor input_deck = 2;       // FW16 input deck (top row + touchpad; position tells them apart).
  repeated ModuleDescriptor internal_fixed = 3;   // Present fixed internals (keyboard/touchpad/fingerprint/touchscreen/webcam).
  repeated ModuleDescriptor detached = 4;         // Known but currently removed modules.
  bool has_expansion_bay = 5;
  ModuleDescriptor expansion_bay = 6;             // Identity refined from the FW16 bay snapshot; unset when absent.
  string expansion_bay_board = 7;                 // FrameworkExpansionBayBoard name (e.g. "DualInterposer").
  string expansion_bay_vendor = 8;                // FrameworkExpansionBayVendor name (e.g. "AmdGpu").
  string expansion_bay_serial = 9;
}
