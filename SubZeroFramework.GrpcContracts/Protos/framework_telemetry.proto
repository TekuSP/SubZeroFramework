syntax = "proto3";

option csharp_namespace = "SubZeroFramework.GrpcContracts";

package subzeroframework.grpc;

service FrameworkStatusService {
  rpc GetStatus (GetStatusRequest) returns (FrameworkStatusReply);
  rpc WatchStatus (WatchStatusRequest) returns (stream FrameworkStatusReply);
}

service FrameworkTelemetryService {
  rpc WatchFanCapabilities (WatchFanCapabilitiesRequest) returns (stream FanCapabilityChangeBatchReply);
  rpc WatchFanControlStates (WatchFanControlStatesRequest) returns (stream FanControlStateChangeBatchReply);
  rpc WatchFanStates (WatchFanStatesRequest) returns (stream FanStateChangeBatchReply);
  rpc WatchTelemetryChannels (WatchTelemetryChannelsRequest) returns (stream TelemetryChannelChangeBatchReply);
  rpc WatchCurrentTelemetryValues (WatchCurrentTelemetryValuesRequest) returns (stream CurrentTelemetryValueChangeBatchReply);
  rpc WatchTelemetrySeries (WatchTelemetrySeriesRequest) returns (stream TelemetrySeriesPointChangeBatchReply);
}

service FrameworkFanControlService {
  rpc SetFanRpm (SetFanRpmRequest) returns (SetFanRpmReply);
  rpc SetFanDuty (SetFanDutyRequest) returns (SetFanDutyReply);
  rpc RestoreAutoFanControl (RestoreAutoFanControlRequest) returns (RestoreAutoFanControlReply);
}

message GetStatusRequest {
}

message WatchStatusRequest {
}

message WatchTelemetryChannelsRequest {
}

message WatchFanCapabilitiesRequest {
}

message WatchFanControlStatesRequest {
}

message WatchFanStatesRequest {
}

message WatchCurrentTelemetryValuesRequest {
}

message WatchTelemetrySeriesRequest {
  TelemetryAreaValue area = 1;
  TelemetryEntityKindValue entity_kind = 2;
  int32 index = 3;
  TelemetryMetricValue metric = 4;
  int32 history_window_seconds = 5;
}

message SetFanRpmRequest {
  int32 fan_index = 1;
  int32 target_speed_rpm = 2;
}

message SetFanRpmReply {
  int32 fan_index = 1;
  int32 applied_speed_rpm = 2;
}

message SetFanDutyRequest {
  int32 fan_index = 1;
  double duty_percent = 2;
}

message SetFanDutyReply {
  int32 fan_index = 1;
  double applied_duty_percent = 2;
}

message RestoreAutoFanControlRequest {
  int32 fan_index = 1;
}

message RestoreAutoFanControlReply {
  int32 fan_index = 1;
}

enum TelemetryChangeKind {
  UNSPECIFIED = 0;
  UPSERT = 1;
  REMOVE = 2;
}

enum TelemetryAreaValue {
  TELEMETRY_AREA_VALUE_UNSPECIFIED = 0;
  TELEMETRY_AREA_VALUE_THERMAL = 1;
  TELEMETRY_AREA_VALUE_POWER = 2;
}

enum TelemetryEntityKindValue {
  TELEMETRY_ENTITY_KIND_VALUE_UNSPECIFIED = 0;
  TELEMETRY_ENTITY_KIND_VALUE_TEMPERATURE_SENSOR = 1;
  TELEMETRY_ENTITY_KIND_VALUE_FAN = 2;
  TELEMETRY_ENTITY_KIND_VALUE_BATTERY = 3;
}

enum TelemetryMetricValue {
  TELEMETRY_METRIC_VALUE_UNSPECIFIED = 0;
  TELEMETRY_METRIC_VALUE_TEMPERATURE_CELSIUS = 1;
  TELEMETRY_METRIC_VALUE_FAN_SPEED_RPM = 2;
  TELEMETRY_METRIC_VALUE_BATTERY_CHARGE_PERCENT = 3;
  TELEMETRY_METRIC_VALUE_BATTERY_PRESENT_RATE_AMPERES = 4;
  TELEMETRY_METRIC_VALUE_BATTERY_PRESENT_VOLTAGE_VOLTS = 5;
}

enum FanStateValue {
  FAN_STATE_VALUE_UNSPECIFIED = 0;
  FAN_STATE_VALUE_OK = 1;
  FAN_STATE_VALUE_NOT_PRESENT = 2;
  FAN_STATE_VALUE_STALLED = 3;
}

enum TemperatureStateValue {
  TEMPERATURE_STATE_VALUE_UNSPECIFIED = 0;
  TEMPERATURE_STATE_VALUE_OK = 1;
  TEMPERATURE_STATE_VALUE_NOT_PRESENT = 2;
  TEMPERATURE_STATE_VALUE_ERROR = 3;
  TEMPERATURE_STATE_VALUE_NOT_POWERED = 4;
  TEMPERATURE_STATE_VALUE_NOT_CALIBRATED = 5;
}

enum FanControlModeValue {
  FAN_CONTROL_MODE_VALUE_UNSPECIFIED = 0;
  FAN_CONTROL_MODE_VALUE_AUTO = 1;
  FAN_CONTROL_MODE_VALUE_MANUAL = 2;
  FAN_CONTROL_MODE_VALUE_CUSTOM_CURVE = 3;
}

enum TemperatureAggregationModeValue {
  TEMPERATURE_AGGREGATION_MODE_VALUE_UNSPECIFIED = 0;
  TEMPERATURE_AGGREGATION_MODE_VALUE_AVERAGE = 1;
  TEMPERATURE_AGGREGATION_MODE_VALUE_MEDIAN = 2;
  TEMPERATURE_AGGREGATION_MODE_VALUE_MAXIMUM = 3;
  TEMPERATURE_AGGREGATION_MODE_VALUE_MINIMUM = 4;
}

message TelemetryChannelIdReply {
  TelemetryAreaValue area = 1;
  TelemetryEntityKindValue entity_kind = 2;
  int32 index = 3;
  TelemetryMetricValue metric = 4;
}

message TelemetryChannelChangeReply {
  TelemetryChangeKind change_kind = 1;
  TelemetryChannelIdReply channel_id = 2;
  string display_name = 3;
  string unit_symbol = 4;
  int64 first_observed_at_unix_time_milliseconds = 5;
  int64 last_observed_at_unix_time_milliseconds = 6;
  bool is_available = 7;
}

message TelemetryChannelChangeBatchReply {
  repeated TelemetryChannelChangeReply changes = 1;
}

message FanCapabilityChangeReply {
  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  uint32 features = 4;
  bool supports_fan_control = 5;
  bool supports_thermal_reporting = 6;
  int64 observed_at_unix_time_milliseconds = 7;
  bool is_available = 8;
}

message FanCapabilityChangeBatchReply {
  repeated FanCapabilityChangeReply changes = 1;
}

message FanCurvePointReply {
  int32 temperature_celsius = 1;
  double fan_duty_percent = 2;
}

message FanControlStateChangeReply {
  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  FanControlModeValue control_mode = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool is_available = 6;
  reserved 7, 8;
  TemperatureAggregationModeValue driving_temperature_aggregation = 9;
  repeated int32 driving_sensor_indices = 10;
  repeated FanCurvePointReply custom_curve_points = 11;
}

message FanControlStateChangeBatchReply {
  repeated FanControlStateChangeReply changes = 1;
}

message FanStateChangeReply {
  TelemetryChangeKind change_kind = 1;
  int32 fan_index = 2;
  string display_name = 3;
  FanStateValue fan_state = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool is_available = 6;
}

message FanStateChangeBatchReply {
  repeated FanStateChangeReply changes = 1;
}

message CurrentTelemetryValueChangeReply {
  TelemetryChangeKind change_kind = 1;
  TelemetryChannelIdReply channel_id = 2;
  string display_name = 3;
  string unit_symbol = 4;
  int64 observed_at_unix_time_milliseconds = 5;
  bool has_numeric_value = 6;
  double numeric_value = 7;
  bool is_available = 8;
  TemperatureStateValue temperature_state = 9;
}

message CurrentTelemetryValueChangeBatchReply {
  repeated CurrentTelemetryValueChangeReply changes = 1;
}

message TelemetrySeriesPointChangeReply {
  TelemetryChangeKind change_kind = 1;
  int64 sample_id = 2;
  TelemetryChannelIdReply channel_id = 3;
  int64 observed_at_unix_time_milliseconds = 4;
  double numeric_value = 5;
}

message TelemetrySeriesPointChangeBatchReply {
  repeated TelemetrySeriesPointChangeReply changes = 1;
}

message FrameworkStatusReply {
  int64 observed_at_unix_time_milliseconds = 1;
  string connection_library_version = 2;
  string connection_library_informational_version = 3;
  bool is_library_available = 4;
  bool has_framework_device_value = 5;
  bool is_framework_device = 6;
  string device_model = 7;
  string platform = 8;
  string platform_family = 9;
  repeated string supported_drivers = 10;
  string active_driver = 11;
  string ec_build_info = 12;
  bool is_ec_polling_enabled = 13;
  bool is_connection_open = 14;
  bool is_grpc_active = 15;
  int64 last_telemetry_observed_at_unix_time_milliseconds = 16;
  bool requires_elevation = 17;
  string last_error = 18;
  bool is_fan_control_enabled = 19;
  bool has_caller_identity_validation = 20;
  string fan_control_authorization_message = 21;
}
