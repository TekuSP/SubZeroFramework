  TEMPERATURE_SENSOR_NAME_VALUE_F75303_DDR = 4;
  TEMPERATURE_SENSOR_NAME_VALUE_BATTERY = 5;
  TEMPERATURE_SENSOR_NAME_VALUE_PECI = 6;
  TEMPERATURE_SENSOR_NAME_VALUE_F57397_VCC_GT = 7;
  TEMPERATURE_SENSOR_NAME_VALUE_F75303_SKIN = 8;
