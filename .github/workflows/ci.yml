name: Build and Publish CI

on:
  push:
    branches:
      - master
      - release/**

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - release/**

  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  VERSION_PREFIX: '0.1'
  WINUI_PUBLISH_PROFILE: './SubZeroFramework/Properties/PublishProfiles/'
  SOLUTION_NAME: './SubZeroFramework/SubZeroFramework.csproj'
  ARTIFACT_OUTPUT: '${{ github.workspace }}/artifacts'
  GITHUB_TOKEN: ${{ secrets.GTH_EXTENDED_TOKEN }}

permissions:
  packages: write
  contents: read
  actions: write

jobs:
  build_and_publish_windows:
    name: Build and publish app on Windows - (${{ matrix.type }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Windows
            runsOn: windows-latest
            platform: win-x64
            type: x64
          - os: Windows
            runsOn: windows-11-arm
            platform: win-arm64
            type: arm64

    runs-on: ${{ matrix.runsOn }}

    env:
      PUBLISH_DOTNET_TARGET_FRAMEWORK: 'net10.0-windows10.0.26100'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install UNO.Check
        run: dotnet tool install -g uno.check

      - name: Install UNO Workloads
        run: uno-check -v --ci --non-interactive --fix --target windows --skip vswin --skip vsmac --skip xcode --skip vswinworkloads --skip androidemulator --skip dotnetnewunotemplates

      - name: Add GitHub Package Registry as a NuGet Source
        run: dotnet nuget add source --store-password-in-clear-text --name "GitHub" https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --username "${{ github.actor }}" --password "${{ env.GITHUB_TOKEN }}"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_NAME }} -v normal -r ${{ matrix.platform }} -p:PublishReadyToRun=true -p:PublishProfile=${{ env.WINUI_PUBLISH_PROFILE }}${{ matrix.platform }}.pubxml
         
      - name: Build
        run: dotnet build --no-restore ${{ env.SOLUTION_NAME }} -v normal -c Release -f ${{ env.PUBLISH_DOTNET_TARGET_FRAMEWORK }} -p:PublishProfile=${{ env.WINUI_PUBLISH_PROFILE }}${{ matrix.platform }}.pubxml -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable
         
      - name: Publish
        run: dotnet publish --no-restore --no-build ${{ env.SOLUTION_NAME }} -v normal -c Release -f ${{ env.PUBLISH_DOTNET_TARGET_FRAMEWORK }} -p:PublishProfile=${{ env.WINUI_PUBLISH_PROFILE }}${{ matrix.platform }}.pubxml -p:PublishDir=${{ env.ARTIFACT_OUTPUT }} -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        continue-on-error: false
        with:
          name: SubZero Framework - Windows ${{ matrix.type }} WinUI3
          path: ${{ env.ARTIFACT_OUTPUT }}
          if-no-files-found: error

      - name: "Cancel if failure"
        if: ${{ failure() }}
        uses: potiuk/cancel-workflow-runs@master
        with:
          cancelMode: self
          cancelFutureDuplicates: false
          selfPreservation: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build_and_publish_linux:
    name: Build and publish app on Linux - (${{ matrix.type }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Linux
            runsOn: ubuntu-latest
            platform: linux-x64
            type: x64
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            type: arm64

    runs-on: ${{ matrix.runsOn }}

    env:
      PUBLISH_DOTNET_TARGET_FRAMEWORK: 'net10.0-desktop'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install UNO.Check
        run: dotnet tool install -g uno.check

      - name: Install UNO Workloads
        run: uno-check -v --ci --non-interactive --fix --target desktop --skip vswin --skip vsmac --skip xcode --skip vswinworkloads --skip androidemulator --skip dotnetnewunotemplates

      - name: Add GitHub Package Registry as a NuGet Source
        run: dotnet nuget add source --store-password-in-clear-text --name "GitHub" https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --username "${{ github.actor }}" --password "${{ env.GITHUB_TOKEN }}"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_NAME }} -v normal -r ${{ matrix.platform }}
         
      - name: Build
        run: dotnet build --no-restore ${{ env.SOLUTION_NAME }} -v normal -c Release -f ${{ env.PUBLISH_DOTNET_TARGET_FRAMEWORK }} -r ${{ matrix.platform }} -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable
         
      - name: Publish
        run: dotnet publish --no-restore --no-build ${{ env.SOLUTION_NAME }} -v normal -c Release -f ${{ env.PUBLISH_DOTNET_TARGET_FRAMEWORK }} -p:TargetFrameworks=${{ env.PUBLISH_DOTNET_TARGET_FRAMEWORK }} -r ${{ matrix.platform }}  -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:PublishDir=${{ env.ARTIFACT_OUTPUT }} -p:Version=${{ env.VERSION_PREFIX }}.${{ github.run_number }} -p:InformationalVersion=${{ env.VERSION_PREFIX }}.${{ github.run_number }}+${{ github.sha }} -p:DebugSymbols=true -p:DebugType=portable
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        continue-on-error: false
        with:
          name: SubZero Framework - Linux ${{ matrix.type }} SKIA
          path: ${{ env.ARTIFACT_OUTPUT }}
          if-no-files-found: error

      - name: "Cancel if failure"
        if: ${{ failure() }}
        uses: potiuk/cancel-workflow-runs@master
        with:
          cancelMode: self
          cancelFutureDuplicates: false
          selfPreservation: false
          token: ${{ secrets.GITHUB_TOKEN }}
